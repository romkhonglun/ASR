# @package _global_

# Main configuration for TDT-VI ASR
defaults:
  - _self_
  - model: tdt-vi
  - dataset: vlsp2020
  - trainer: lightning
  - logging: wandb
  - cache: redis

# Override any config from CLI
# Example: python -m asr.training.train model.tokenizer.vocab_size=2048
# Example: python -m asr.training.train trainer.max_epochs=100
# Example: python -m asr.training.train decoder.predictor.hidden_dim=768
# Example: python -m asr.training.train encoder.freeze=true
