# @package _global_

# Redis configuration for API caching
redis:
  enabled: false
  host: localhost
  port: 6379
  db: 0
  password: null
  ssl: false

  # Connection pool
  max_connections: 10
  socket_timeout: 5
  socket_connect_timeout: 5
  retry_on_timeout: true

  # Cache settings
  cache:
    ttl: 3600  # 1 hour in seconds
    key_prefix: "asr:transcription:"
    max_memory: 512mb
    eviction_policy: allkeys-lru
